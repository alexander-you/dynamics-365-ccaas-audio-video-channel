# Deploys the mock agent media panel (src/agent-media-panel) to GitHub Pages.
#
# SCOPE: hosts the MOCK-ONLY panel so it can be embedded as a CIF v2 widget in Dynamics 365.
# - Built with VITE_USE_MOCKS=true → no real ACS tokens, no ACS calls, no Dataverse calls.
# - No secrets, tenant values, or environment URLs are referenced by this workflow or the build.
# - Static output only. No Azure resources are provisioned.
name: Deploy agent media panel to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/agent-media-panel/**"
      - ".github/workflows/deploy-agent-media-panel.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/agent-media-panel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/agent-media-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build (mock only)
        env:
          VITE_USE_MOCKS: "true"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/agent-media-panel/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
